services:
  db:
    image: postgres:16-alpine
    container_name: selection_neuro_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: selection_neuro
    ports:
      - "5432:5432"
    volumes:
      - pgdata_selection_neuro:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d selection_neuro"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata_selection_neuro: